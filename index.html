<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pizzeria RAM Machine</title>
  <link rel="stylesheet" href="index_files/styles.css">
</head>
<body>
  
  <img src="conv.png" id="conveyor">
  <img src="piec.png" id="piec">
  <img src="stoliki%20gora.png" id="gora">
   <img src="memo.png" id="memory">
  <div class="app">
    <div class="toolbar">

      <button class="btn green" id="run">▶</button>
      <button class="btn" id="step">⏭</button>
      <button class="btn red" id="stop">■</button>
      <button class="btn" id="reset">↻</button>
      
      <button class="btn" id="addRow">+ row</button>
      <button class="btn" id="sample">Example: sum</button>

    </div>
    
    <div class="tape inputTape tape" id="inputTape" style="position: absolute;left: 50%;top: 100px;">
      <div>
        <button class="btn small" data-tape="in" data-act="home">|◀</button> 
        <button class="btn small" data-tape="in" data-act="left">◀</button>
        <div class="tapeTitle">Input tape</div>
      </div>

      <div class="tapeCells"></div>
      
      <button class="btn small" data-tape="in" data-act="right">▶</button>
      
      <div class="head"></div>

    </div>

    <div class="main">

      <div class="left">

        <div class="panel processor" style="position: absolute;">

          <h3>Processor</h3>

          <div class="row">
            <b>Instruction:</b>
            <div class="display" id="pInstr"></div>
          </div>

          <div class="row">
            <b>Argument:</b>
            <div class="display" id="pArg"></div>
          </div>

        </div>

        <div class="panel memory" style="position: absolute;left: 1500px;color: white;top: 500px;">
          <h3>Memory</h3>
            <div class="memBody"><table class="memTable">
              <thead>
                <tr>
                  <th>Address</th>
                  <th>Value</th>
                </tr>
              </thead>

              <tbody id="memRows"></tbody>
            
              </table>
          
            </div>
        
          <div class="memNav">
            <button class="btn" data-mem="up">▲</button>
            <button class="btn" id="showAddr">Show Address…</button>
            <button class="btn" data-mem="down">▼</button>
          </div>
        </div>
      </div>
      
      <div class="panel program">
        <h3>Program</h3>
        <div class="progWrap">
          <table class="progTable">
            <thead>
              <tr>
                <th>LN</th>
                <th>Label</th>
                <th>Instruction</th>
                <th>Argument</th>
                <th>Comment</th>
                <th>EC</th>
                <th>EP</th>
              </tr>
            </thead>

            <tbody id="progRows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="tape outputTape tape" id="outputTape" style="position: absolute;left: 50%;top: 1500px;">
      <div>
        <button class="btn small" data-tape="out" data-act="home">|◀</button> 
        <button class="btn small" data-tape="out" data-act="left">◀</button>
        
        <div class="tapeTitle">Output tape</div>
      </div>

      <div class="tapeCells"></div>
      <button class="btn small" data-tape="out" data-act="right">▶</button>
      <div class="head"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div>
      <h3>Show Address…</h3>
      <input id="addrInput" type="number" min="0" step="1" placeholder="Adres komórki">
      <button class="btn green" id="goAddr">Go!</button> 
      <button class="btn" id="closeModal">Close</button>
    </div>
  </div>
  

</body></html>
