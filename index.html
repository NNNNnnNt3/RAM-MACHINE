<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pizzeria RAM Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="toolbar">

      <button class="btn green" id="run">▶</button>
      <button class="btn" id="step">⏭</button>
      <button class="btn red" id="stop">■</button>
      <button class="btn" id="reset">↻</button>

      <label>Prędkość 
        <input class="speed" id="speed" type="range" min="50" max="1200" value="350">
      </label>
      
      <button class="btn" id="addRow">+ wiersz</button>
      <button class="btn" id="sample">Przykład: suma</button>
      
      <span class="hint">
        Instrukcje: LOAD STORE ADD SUB MULT DIV READ WRITE JUMP JGTZ JZERO HALT
      </span>

    </div>
    
    <div class="tape inputTape tape" id="inputTape">
      <div>
        <button class="btn small" data-tape="in" data-act="home">|◀</button> 
        <button class="btn small" data-tape="in" data-act="left">◀</button>
        <div class="tapeTitle">Taśma wejściowa</div>
      </div>

      <div class="tapeCells"></div>
      
      <button class="btn small" data-tape="in" data-act="right">▶</button>
      
      <div class="head"></div>

    </div>

    <div class="main">

      <div class="left">

        <div class="panel processor">

          <h3>Processor</h3>

          <div class="row">
            <b>Instruction:</b>
            <div class="display" id="pInstr"></div>
          </div>

          <div class="row">
            <b>Argument:</b>
            <div class="display" id="pArg"></div>
          </div>

        </div>

        <div class="panel memory">
          <h3>Memory</h3>
            <div class="memBody"><table class="memTable">
              <thead>
                <tr>
                  <th>Address</th>
                  <th>Value</th>
                </tr>
              </thead>

              <tbody id="memRows"></tbody>
            
              </table>
          
            </div>
        
          <div class="memNav">
            <button class="btn" data-mem="up">▲</button>
            <button class="btn" id="showAddr">Show Address…</button>
            <button class="btn" data-mem="down">▼</button>
          </div>
        </div>
      </div>
      
      <div class="panel program">
        <h3>Program</h3>
        <div class="progWrap">
          <table class="progTable">
            <thead>
              <tr>
                <th>LN</th>
                <th>Label</th>
                <th>Instruction</th>
                <th>Argument</th>
                <th>Comment</th>
                <th>EC</th>
                <th>EP</th>
              </tr>
            </thead>

            <tbody id="progRows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="tape outputTape tape" id="outputTape">
      <div>
        <button class="btn small" data-tape="out" data-act="home">|◀</button> 
        <button class="btn small" data-tape="out" data-act="left">◀</button>
        
        <div class="tapeTitle">Taśma wyjściowa</div>
      </div>

      <div class="tapeCells"></div>
      <button class="btn small" data-tape="out" data-act="right">▶</button>
      <div class="head"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div>
      <h3>Show Address…</h3>
      <input id="addrInput" type="number" min="0" step="1" placeholder="Adres komórki">
      <button class="btn green" id="goAddr">Go!</button> 
      <button class="btn" id="closeModal">Anuluj</button>
    </div>
  </div>
  
  <div class="log" id="log">Gotowe.</div>

</body>
</html>
